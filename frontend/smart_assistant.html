<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Smart Assistant — KrishiSetu</title>
  <link rel="icon" href="images/krishisetu-mark.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green:      #2e7d32;
      --green-dk:   #1b5e20;
      --green-lt:   #e8f5e9;
      --green-bd:   #c8e6c9;
      --blue-lt:    #eff6ff;
      --blue-bd:    #bfdbfe;
      --blue-txt:   #1e40af;
      --amber:      #fffbeb;
      --amber-bd:   #fde68a;
      --amber-txt:  #92400e;
      --red-lt:     #fef2f2;
      --red-bd:     #fecaca;
      --red-txt:    #991b1b;
      --pink-lt:    #fdf2f8;
      --pink-bd:    #fbcfe8;
      --pink-txt:   #9d174d;
      --user-bg:    #dcfce7;
      --ai-bg:      #f0f9ff;
      --bg:         #faf8f5;
      --card:       #ffffff;
      --text:       #0f172a;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     14px;
      --trans:      .15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Shell ── */
    .shell { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top bar ── */
    .topbar {
      height: 54px; flex-shrink: 0;
      background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 14px; z-index: 50;
    }
    .topbar-logo { display: flex; align-items: center; text-decoration: none; line-height: 0; }
    .topbar-logo img { height: 32px; width: auto; display: block; }
    .topbar-sep { width: 1px; height: 24px; background: var(--border); }
    .topbar-title {
      font-size: 13.5px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 7px;
    }
    .topbar-title i { color: var(--green); }
    .topbar-spacer { flex: 1; }
    .topbar-back {
      font-size: 12.5px; font-weight: 600; color: var(--muted);
      background: none; border: 1px solid var(--border);
      padding: 5px 13px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background var(--trans); text-decoration: none;
    }
    .topbar-back:hover { background: #f8fafc; color: var(--text); }

    /* ── Two-column main ── */
    .main { flex: 1; display: grid; grid-template-columns: 1fr 380px; overflow: hidden; }

    /* ═══════════════════════════════
       LEFT — CHAT
    ═══════════════════════════════ */
    .chat-col {
      display: flex; flex-direction: column;
      min-width: 0; border-right: 1px solid var(--border); background: var(--card);
    }

    /* Quick ask chips */
    .quick-bar {
      padding: 9px 14px 8px; display: flex; gap: 6px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: #fafafa;
    }
    .ql {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .4px;
      align-self: center; white-space: nowrap;
    }
    .qchip {
      font-size: 12px; padding: 5px 12px; border-radius: 16px;
      background: var(--blue-lt); border: 1px solid var(--blue-bd);
      color: var(--blue-txt); font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: background var(--trans);
    }
    .qchip:hover { background: #dbeafe; }
    .qchip.green { background: var(--green-lt); border-color: var(--green-bd); color: var(--green-dk); }
    .qchip.green:hover { background: #d1fae5; }
    .qchip.amber { background: var(--amber); border-color: var(--amber-bd); color: var(--amber-txt); }
    .qchip.amber:hover { background: #fef3c7; }

    /* Active context badges */
    .ctx-badge-bar {
      padding: 5px 14px; display: flex; gap: 5px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: #fafafa; min-height: 0;
    }
    .ctx-badge-bar:empty { display: none; }
    .ctx-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--green-lt); border: 1px solid var(--green-bd);
      color: var(--green-dk); font-weight: 600;
    }

    /* Chat messages */
    .chat-box { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }
    .chat-box::-webkit-scrollbar { width: 5px; }
    .chat-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }

    .msg-row { display: flex; margin: 9px 0; gap: 8px; align-items: flex-end; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .avatar.ai-av   { background: var(--green); color: #fff; }
    .avatar.user-av { background: #d1fae5; color: var(--green-dk); }

    .bubble {
      max-width: 80%; padding: 11px 13px; border-radius: 14px;
      line-height: 1.55; word-break: break-word;
      border: 1px solid rgba(0,0,0,.05); font-size: 13.5px;
    }
    .user .bubble { background: var(--user-bg); border-top-right-radius: 4px; }
    .ai   .bubble { background: var(--ai-bg);   border-top-left-radius: 4px; }
    .bubble .r-p { margin: 0 0 6px 0; }
    .bubble .r-p:last-child { margin-bottom: 0; }
    .bubble ul { margin: 4px 0 7px 4px; padding-left: 16px; }
    .bubble li { margin: 4px 0; }

    .insight-chip {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
      padding: 5px 11px; border-radius: 10px;
      background: var(--amber); border: 1px solid var(--amber-bd);
      color: var(--amber-txt); font-size: 11.5px; font-weight: 600;
    }
    .conf {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 700; padding: 2px 8px;
      border-radius: 8px; margin-top: 7px; margin-right: 4px;
    }
    .conf.high   { background: #d1fae5; color: #065f46; }
    .conf.medium { background: var(--amber); color: var(--amber-txt); }
    .conf.low    { background: var(--red-lt); color: var(--red-txt); }

    .escalate-btn {
      margin-top: 8px; display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px; background: #ff9800; color: #111827;
      border: none; border-radius: 8px; font-size: 11.5px; font-weight: 700;
      cursor: pointer; transition: opacity var(--trans);
    }
    .escalate-btn:hover { opacity: .85; }

    .typing-row .bubble { padding: 10px 14px; display: flex; align-items: center; gap: 10px; color: var(--muted); }
    .dots { display: flex; gap: 4px; }
    .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: bounce .9s infinite; }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

    .sys-row { text-align: center; margin: 8px 0; }
    .sys-pill { display: inline-block; font-size: 11.5px; color: var(--muted); background: #f1f5f9; padding: 3px 12px; border-radius: 12px; }

    /* Input bar */
    .input-bar { padding: 10px 12px; border-top: 1px solid var(--border); background: rgba(255,255,255,.95); backdrop-filter: blur(6px); }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-row input {
      flex: 1; padding: 11px 13px; border: 1.5px solid var(--border);
      border-radius: 11px; outline: none; font-size: 13.5px;
      font-family: 'Inter', sans-serif; background: #fff;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    .input-row input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.09); }
    .send-btn {
      padding: 11px 16px; background: var(--green); color: #fff;
      border: none; border-radius: 11px; cursor: pointer;
      font-weight: 700; font-size: 14px; transition: opacity var(--trans);
    }
    .send-btn:disabled { opacity: .55; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { opacity: .88; }

    /* ═══════════════════════════════
       RIGHT — SIDE PANEL
    ═══════════════════════════════ */
    .side-col { display: flex; flex-direction: column; background: #f8fafc; min-width: 0; overflow: hidden; }

    /* Tab bar */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
    .tab-btn {
      flex: 1; padding: 11px 4px; text-align: center;
      font-size: 11.5px; font-weight: 600; color: var(--muted);
      background: none; border: none; border-bottom: 2.5px solid transparent;
      margin-bottom: -1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: color var(--trans); white-space: nowrap;
    }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-btn .badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; background: #f1f5f9; color: var(--muted); }
    .tab-btn.active .badge { background: var(--green-lt); color: var(--green); }

    .tab-content { flex: 1; overflow-y: auto; }
    .tab-content::-webkit-scrollbar { width: 5px; }
    .tab-content::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── TAB 1: Farm Context ── */
    .ctx-panel { padding: 14px; }
    .ctx-section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .ctx-section-title i { color: var(--green); }
    .ctx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ctx-field label { display: block; font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
    .ctx-field input, .ctx-field select {
      width: 100%; padding: 7px 9px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 12px; font-family: 'Inter', sans-serif;
      background: #fff; color: var(--text); outline: none;
    }
    .ctx-field input:focus, .ctx-field select:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(22,163,74,.09); }
    .ctx-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .ctx-btn {
      font-size: 11.5px; font-weight: 600; padding: 5px 12px; border-radius: 8px;
      background: var(--green-lt); border: 1px solid var(--green-bd); color: var(--green);
      cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background var(--trans);
    }
    .ctx-btn:hover { background: #d1fae5; }
    .ctx-btn.ghost { background: #f1f5f9; border-color: var(--border); color: var(--muted); }
    .ctx-btn.ghost:hover { background: #e2e8f0; }

    /* Context summary */
    .ctx-summary-card { margin-top: 12px; padding: 11px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; }
    .ctx-summary-body { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .ask-ctx-btn {
      width: 100%; margin-top: 8px;
      background: var(--blue-lt); border: 1px solid var(--blue-bd);
      color: var(--blue-txt); border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; transition: background var(--trans);
    }
    .ask-ctx-btn:hover { background: #dbeafe; }

    /* Divider */
    .side-divider { height: 1px; background: var(--border); margin: 14px 0 10px; }

    /* ── Quick Actions (within context tab) ── */
    .qa-section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .qa-section-title i { color: var(--green); }
    .qa-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .qa-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; padding: 12px 6px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: #fff; cursor: pointer; text-decoration: none;
      color: var(--text); transition: background var(--trans), border-color var(--trans), transform var(--trans);
    }
    .qa-btn:hover { background: var(--green-lt); border-color: var(--green-bd); transform: translateY(-1px); }
    .qa-btn i { font-size: 18px; color: var(--green); }
    .qa-btn span { font-size: 11px; font-weight: 600; text-align: center; line-height: 1.3; color: var(--text); }

    /* ── TAB 2: AI Scanner ── */
    .scanner-panel { padding: 14px; }
    .upload-zone {
      border: 2px dashed #86efac; border-radius: 10px;
      padding: 28px 16px; text-align: center; cursor: pointer;
      background: var(--green-lt); position: relative; transition: var(--trans);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--green); background: #dcfce7; }
    .upload-zone i { font-size: 30px; color: #86efac; display: block; margin-bottom: 8px; }
    .upload-zone p { font-size: 12px; color: var(--muted); }
    .upload-zone strong { color: var(--green); }
    #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    #previewWrapper { display: none; margin-top: 12px; text-align: center; }
    #previewImg { max-width: 100%; max-height: 160px; border-radius: 8px; border: 2px solid #86efac; object-fit: contain; }
    .preview-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .change-btn { font-size: 11.5px; color: var(--green); cursor: pointer; text-decoration: underline; background: none; border: none; margin-top: 4px; display: inline-block; }

    .scan-form { margin-top: 12px; }
    .scan-form label { display: block; font-size: 11.5px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .scan-form select { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 12.5px; font-family: 'Inter', sans-serif; background: #fff; color: var(--text); outline: none; }
    .scan-form select:focus { border-color: var(--green); }

    .btn-scan {
      width: 100%; margin-top: 12px;
      background: linear-gradient(135deg, #43a047, var(--green));
      color: #fff; border: none; border-radius: 9px; padding: 11px;
      font-size: 13.5px; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity var(--trans), transform var(--trans);
    }
    .btn-scan:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-scan:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    .scan-alert { padding: 9px 12px; border-radius: 8px; font-size: 12px; display: none; margin-bottom: 10px; }
    .scan-alert.error   { background: var(--red-lt); border: 1px solid var(--red-bd); color: var(--red-txt); }
    .scan-alert.info    { background: var(--blue-lt); border: 1px solid var(--blue-bd); color: var(--blue-txt); }
    .scan-alert.success { background: var(--green-lt); border: 1px solid var(--green-bd); color: var(--green-dk); }

    .detect-results { margin-top: 14px; }
    .det-block { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
    .det-hdr { padding: 10px 14px; font-size: 12.5px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    .det-hdr.d { background: #fef9c3; color: #854d0e; }
    .det-hdr.p { background: var(--pink-lt); color: var(--pink-txt); }
    .det-body { padding: 12px 14px; background: #fff; }
    .det-label { font-size: 16px; font-weight: 800; margin-bottom: 5px; }
    .det-label.d { color: #b45309; }
    .det-label.p { color: #be185d; }

    .conf-bar-bg { background: #e2e8f0; border-radius: 50px; height: 6px; overflow: hidden; margin: 8px 0; }
    .conf-bar-fg { height: 100%; border-radius: 50px; transition: width .8s ease; }
    .conf-bar-fg.d { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .conf-bar-fg.p { background: linear-gradient(90deg, #ec4899, #db2777); }
    .conf-pct { font-size: 11px; color: var(--muted); }
    .sev-chip { display: inline-block; padding: 2px 9px; border-radius: 50px; font-size: 10.5px; font-weight: 700; margin-bottom: 9px; }
    .sev-none   { background: #dcfce7; color: #166534; }
    .sev-low    { background: #fef9c3; color: #854d0e; }
    .sev-medium { background: #ffedd5; color: #9a3412; }
    .sev-high   { background: #fee2e2; color: #991b1b; }
    .det-row { display: flex; gap: 7px; margin-bottom: 7px; font-size: 12px; }
    .det-row i { color: var(--green); width: 16px; flex-shrink: 0; margin-top: 2px; font-size: 11px; }
    .det-row strong { color: var(--text); white-space: nowrap; }
    .det-row span   { color: var(--muted); }
    .healthy-badge { display: flex; align-items: center; gap: 8px; background: var(--green-lt); border: 1px solid var(--green-bd); border-radius: 8px; padding: 10px 12px; color: #166534; font-weight: 600; font-size: 12.5px; }
    .healthy-badge i { color: #2e7d32; font-size: 16px; }
    .ask-ai-about { width: 100%; margin-top: 8px; background: var(--blue-lt); border: 1px solid var(--blue-bd); color: var(--blue-txt); border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: background var(--trans); }
    .ask-ai-about:hover { background: #dbeafe; }

    /* ── TAB 3: Expert Replies ── */
    .expert-panel { padding: 12px; }
    .expert-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px; margin-bottom: 10px; font-size: 12.5px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .expert-card.new-reply { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,.18); animation: pop .3s ease; }
    @keyframes pop { from{transform:scale(.98)} to{transform:scale(1)} }
    .expert-card p { margin: 4px 0; }
    .expert-card .q-text { font-weight: 600; color: var(--text); }
    .expert-card .e-answered { color: var(--green); font-weight: 600; }
    .no-replies { padding: 24px 12px; text-align: center; color: var(--muted); font-size: 13px; }
    .no-replies i { font-size: 28px; display: block; margin-bottom: 8px; opacity: .25; }
    .expert-refresh { width: 100%; margin-bottom: 10px; padding: 7px; border-radius: 8px; background: var(--green-lt); border: 1px solid var(--green-bd); color: var(--green); font-size: 12.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background var(--trans); }
    .expert-refresh:hover { background: #d1fae5; }

    /* Toast */
    #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff; background: var(--green); box-shadow: 0 4px 16px rgba(0,0,0,.15); opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none; z-index: 9999; display: flex; align-items: center; gap: 7px; }
    #toast.show { opacity: 1; transform: none; }

    /* Responsive */
    @media (max-width: 820px) { .main { grid-template-columns: 1fr; } .side-col { display: none; } body { overflow: auto; } }
    @media (max-width: 480px) { .bubble { max-width: 90%; } }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <a class="topbar-logo" href="home.html" title="KrishiSetu">
      <img src="images/krishisetu-logo.svg" alt="KrishiSetu" width="160" height="32" />
    </a>
    <div class="topbar-sep"></div>
    <div class="topbar-title">
      <i class="fas fa-robot"></i> Smart Assistant
    </div>
    <div class="topbar-spacer"></div>
    <a class="topbar-back" href="pages/dashboard.html">
      <i class="fas fa-arrow-left"></i> Dashboard
    </a>
  </header>

  <div class="main">

    <!-- ═══════════════════════════
         LEFT — CHAT
    ═══════════════════════════════ -->
    <div class="chat-col">

      <!-- Quick-ask chips -->
      <div class="quick-bar">
        <span class="ql">Ask:</span>
        <button class="qchip green" onclick="quickAsk('What is the best crop for my location and conditions?')">
          <i class="fas fa-seedling"></i> Best crop
        </button>
        <button class="qchip amber" onclick="quickAsk('What fertilizer should I apply now for better yield?')">
          <i class="fas fa-flask"></i> Fertilizer
        </button>
        <button class="qchip" onclick="quickAsk('How do I control the detected pest effectively?')">
          <i class="fas fa-bug"></i> Pest control
        </button>
        <button class="qchip green" onclick="quickAsk('How do I treat the detected disease on my crop?')">
          <i class="fas fa-pills"></i> Treat disease
        </button>
        <button class="qchip" onclick="quickAsk('Will I make a profit this season?')">
          <i class="fas fa-chart-line"></i> Profit
        </button>

<script>
/* ═══════════════════════════════════════════════════════════
   KrishiSetu Smart Assistant
   POST /api/chatbot   — AI chat
   POST /smart/analyze — image scan (disease + pest)
   GET  /api/expert/queries
═══════════════════════════════════════════════════════════ */

const API = 'http://127.0.0.1:5000';

const LS = {
  CROP:    'ks_last_crop',
  DISEASE: 'ks_last_disease',
  PEST:    'ks_last_pest',
  YIELD:   'ks_last_yield',
  PRICE:   'ks_last_price',
  COST:    'ks_last_cost',
};

let isLoading       = false;
let lastUserMsg     = '';
const seenExpertIds = new Set();

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === `tab-${name}`));
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatReply(text) {
  const lines = String(text || '').split('<br>');
  let html = '', inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    const m = t.match(/^(\*|-|•|\d+\.)\s+([\s\S]*)$/);
    if (m) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${esc(m[2])}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p class="r-p">${esc(t)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.innerHTML = `<i class="fas fa-${ok ? 'check-circle' : 'exclamation-triangle'}"></i> ${esc(msg)}`;
  el.className = 'show';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2600);
}

// ── Context panel ─────────────────────────────────────────────────────────────
function getContext() {
  return {
    crop:         (document.getElementById('ctx-crop').value    || '').trim(),
    disease:      (document.getElementById('ctx-disease').value || '').trim(),
    pest:         (document.getElementById('ctx-pest').value    || '').trim(),
    yield_value:  (document.getElementById('ctx-yield').value   || '').trim(),
    market_price: (document.getElementById('ctx-price').value   || '').trim(),
    cost:         (document.getElementById('ctx-cost').value    || '').trim(),
  };
}

function autoLoadContext() {
  const get = k => localStorage.getItem(k) || '';
  const crop = get(LS.CROP), disease = get(LS.DISEASE), pest = get(LS.PEST);
  const yld  = get(LS.YIELD), price = get(LS.PRICE), cost = get(LS.COST);

  if (crop)    document.getElementById('ctx-crop').value    = crop;
  if (disease) document.getElementById('ctx-disease').value = disease;
  if (pest)    document.getElementById('ctx-pest').value    = pest;
  if (yld)     document.getElementById('ctx-yield').value   = yld;
  if (price)   document.getElementById('ctx-price').value   = price;
  if (cost)    document.getElementById('ctx-cost').value    = cost;

  refreshBadges();
  const hasAny = crop || disease || pest || yld || price;
  hasAny
    ? toast('Farm context loaded from saved data.')
    : addSysMsg('No saved data found. Run modules first, or fill manually.');
}

function clearContext() {
  ['ctx-crop','ctx-disease','ctx-pest','ctx-yield','ctx-price','ctx-cost'].forEach(id => {
    document.getElementById(id).value = '';
  });
  refreshBadges();
}

function refreshBadges() {
  const ctx = getContext();
  const b = [];
  if (ctx.crop)         b.push(`🌾 ${ctx.crop}`);
  if (ctx.disease && ctx.disease.toLowerCase() !== 'healthy') b.push(`🦠 ${ctx.disease}`);
  if (ctx.pest    && ctx.pest.toLowerCase()    !== 'healthy') b.push(`🐛 ${ctx.pest}`);
  if (ctx.yield_value)  b.push(`📦 ${ctx.yield_value} kg`);
  if (ctx.market_price) b.push(`₹${ctx.market_price}/q`);
  if (ctx.cost)         b.push(`💰 ₹${ctx.cost}`);

  document.getElementById('ctxBadges').innerHTML =
    b.map(x => `<span class="ctx-badge">${esc(x)}</span>`).join('');

  const sumEl   = document.getElementById('ctxSummary');
  const sumBody = document.getElementById('ctxSummaryBody');
  if (b.length > 0) {
    sumEl.style.display = '';
    sumBody.innerHTML   = b.map(x =>
      `<span style="display:inline-block; margin-right:10px; margin-bottom:3px;">${esc(x)}</span>`
    ).join('');
  } else {
    sumEl.style.display = 'none';
  }
}

function askAboutContext() {
  const ctx   = getContext();
  const parts = [];
  if (ctx.crop)         parts.push(`crop: ${ctx.crop}`);
  if (ctx.disease && ctx.disease.toLowerCase() !== 'healthy') parts.push(`disease: ${ctx.disease}`);
  if (ctx.pest    && ctx.pest.toLowerCase()    !== 'healthy') parts.push(`pest: ${ctx.pest}`);
  if (ctx.yield_value)  parts.push(`yield: ${ctx.yield_value} kg`);
  if (ctx.market_price) parts.push(`price: ₹${ctx.market_price}/quintal`);
  if (ctx.cost)         parts.push(`cost: ₹${ctx.cost}`);
  const q = parts.length > 0
    ? `Given my farm status (${parts.join(', ')}), what should I focus on to maximise profit?`
    : 'What should I focus on to improve my farm this season?';
  quickAsk(q);
}

// Live badge refresh on every input change
['ctx-crop','ctx-disease','ctx-pest','ctx-yield','ctx-price','ctx-cost'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', refreshBadges);
  el.addEventListener('input',  refreshBadges);
});

// ── Chat rendering ────────────────────────────────────────────────────────────
const chatBox = document.getElementById('chatBox');

function addSysMsg(text) {
  const d = document.createElement('div');
  d.className = 'sys-row';
  d.innerHTML = `<span class="sys-pill">${esc(text)}</span>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg-row user';
  d.innerHTML = `
    <div class="bubble">${esc(text)}</div>
    <div class="avatar user-av"><i class="fas fa-user"></i></div>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg-row ai typing-row';
  d.innerHTML = `
    <div class="avatar ai-av"><i class="fas fa-robot"></i></div>
    <div class="bubble">
      <div class="dots"><span></span><span></span><span></span></div>
      <span style="font-size:12px; color:var(--muted); margin-left:4px;">Analysing…</span>
    </div>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
  return d;
}

function addAiMsg(reply, insight, confidence) {
  const d = document.createElement('div');
  d.className = 'msg-row ai';
  const confClass = { high:'high', medium:'medium', low:'low' }[confidence] || 'medium';
  const confLabel = (confidence || 'medium').toUpperCase();

  let body = formatReply(reply);
  if (insight && insight.length > 3) {
    body += `<div class="insight-chip"><i class="fas fa-lightbulb"></i> ${esc(insight)}</div>`;
  }
  body += `<div>
    <span class="conf ${confClass}">
      <i class="fas fa-circle" style="font-size:6px;"></i> ${confLabel}
    </span>
    <span style="font-size:11px; color:var(--muted);">confidence</span>
  </div>`;
  body += `<button class="escalate-btn" type="button">
    <i class="fas fa-user-tie"></i> Ask Human Expert
  </button>`;

  d.innerHTML = `
    <div class="avatar ai-av"><i class="fas fa-robot"></i></div>
    <div class="bubble">${body}</div>`;
  d.querySelector('.escalate-btn').addEventListener('click', () => escalate(lastUserMsg));
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addEscalatedMsg() {
  const d = document.createElement('div');
  d.className = 'msg-row ai';
  d.innerHTML = `
    <div class="avatar ai-av"><i class="fas fa-robot"></i></div>
    <div class="bubble" style="background:var(--amber); border-color:var(--amber-bd);">
      <p class="r-p">
        <i class="fas fa-paper-plane" style="color:#d97706; margin-right:5px;"></i>
        Query sent to a human expert. Check the <strong>Expert</strong> tab for their reply.
      </p>
    </div>`;
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ── Chat send ─────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const msg   = input.value.trim();
  if (!msg || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.disabled = true;
  lastUserMsg    = msg;

  addUserMsg(msg);
  input.value = '';
  const typingRow = addTyping();

  const ctx    = getContext();
  const hasCtx = Object.values(ctx).some(v => v.length > 0);

  try {
    const res  = await fetch(`${API}/api/chatbot`, {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body:        JSON.stringify({ message: msg, context: hasCtx ? ctx : undefined }),
    });
    const data = await res.json();
    typingRow.remove();

    if (data && (data.reply || data.message)) {
      addAiMsg(data.reply || data.message, data.insight || '', data.confidence || 'medium');
      if (data.escalated) {
        addEscalatedMsg();
        loadExpertReplies();
        switchTab('expert');
      }
    } else {
      addAiMsg('Sorry, could not process that. Please try again.', '', 'low');
    }
  } catch {
    typingRow.remove();
    addAiMsg('Connection error — backend not reachable.', '', 'low');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.disabled = false;
    input.focus();
  }
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function escalate(queryText) {
  if (!queryText) return;
  try {
    const res  = await fetch(`${API}/expert/query`, {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body:        JSON.stringify({ query_text: queryText }),
    });
    const data = await res.json();
    if (data.success) {
      addEscalatedMsg();
      loadExpertReplies();
      switchTab('expert');
    } else {
      addSysMsg(`Could not send to expert: ${data.message || 'Unknown error'}`);
    }
  } catch { addSysMsg('Error sending to expert.'); }
}

// ── AI Scanner ────────────────────────────────────────────────────────────────
let selectedFile = null;
const MAX_MB     = 8;

const uploadZone  = document.getElementById('uploadZone');
const fileInput   = document.getElementById('fileInput');
const previewWrap = document.getElementById('previewWrapper');
const previewImg  = document.getElementById('previewImg');
const scanBtn     = document.getElementById('scanBtn');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showScanAlert('Please select a valid image (JPG, PNG, WEBP).', 'error'); return;
  }
  if (file.size > MAX_MB * 1024 * 1024) {
    showScanAlert(`Image too large — max ${MAX_MB} MB.`, 'error'); return;
  }
  selectedFile = file;
  hideScanAlert();
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    document.getElementById('previewMeta').textContent =
      `${file.name}  (${(file.size / 1024).toFixed(0)} KB)`;
    uploadZone.style.display  = 'none';
    previewWrap.style.display = 'block';
  };
  reader.readAsDataURL(file);
  scanBtn.disabled = false;
}

function resetScan() {
  selectedFile = null;
  fileInput.value = '';
  uploadZone.style.display  = '';
  previewWrap.style.display = 'none';
  scanBtn.disabled = true;
  document.getElementById('detectResults').innerHTML = '';
  hideScanAlert();
}

function showScanAlert(msg, type) {
  const el = document.getElementById('scanAlert');
  el.textContent = msg; el.className = `scan-alert ${type}`; el.style.display = 'block';
}
function hideScanAlert() { document.getElementById('scanAlert').style.display = 'none'; }

async function runScan() {
  if (!selectedFile) { showScanAlert('Please select an image first.', 'error'); return; }
  scanBtn.disabled  = true;
  scanBtn.innerHTML = `<div class="spin"></div><span>Analysing…</span>`;
  hideScanAlert();

  const fd   = new FormData();
  fd.append('image', selectedFile);
  const crop = document.getElementById('cropSelect').value;
  if (crop) fd.append('crop_type', crop);

  try {
    const rawRes  = await fetch(`${API}/smart/analyze`, { method: 'POST', body: fd, credentials: 'include' });
    const rawText = await rawRes.text();

    if (rawRes.status === 401) {
      showScanAlert('Session expired — please log in again.', 'error');
      resetScanBtn(); return;
    }

    let resp;
    try { resp = JSON.parse(rawText); }
    catch { showScanAlert('Unexpected server response.', 'error'); resetScanBtn(); return; }

    if (!rawRes.ok || !resp.success) {
      showScanAlert(resp.message || `Error (HTTP ${rawRes.status})`, 'error');
      resetScanBtn(); return;
    }

    renderScanResults(resp);

    // Auto-update context with scan results
    if (resp.disease?.label && resp.disease.label !== 'Healthy') {
      document.getElementById('ctx-disease').value = resp.disease.label;
      localStorage.setItem(LS.DISEASE, resp.disease.label);
    }
    if (resp.pest?.label && resp.pest.label !== 'Healthy') {
      document.getElementById('ctx-pest').value = resp.pest.label;
      localStorage.setItem(LS.PEST, resp.pest.label);
    }
    if (crop) {
      const cropTitle = crop.charAt(0).toUpperCase() + crop.slice(1);
      document.getElementById('ctx-crop').value = cropTitle;
      localStorage.setItem(LS.CROP, cropTitle);
    }
    refreshBadges();
    toast('Scan complete! Context updated.');

  } catch {
    showScanAlert('Could not reach the server.', 'error');
  } finally {
    resetScanBtn();
  }
}

function resetScanBtn() {
  scanBtn.innerHTML = '<i class="fas fa-microscope"></i><span id="scanBtnText">Analyse Image</span>';
  scanBtn.disabled  = !selectedFile;
}

function renderScanResults(data) {
  const el = document.getElementById('detectResults');
  el.innerHTML = `
    ${renderBlock(data.disease, 'd', 'Disease Detection', 'bacterium')}
    ${renderBlock(data.pest,    'p', 'Pest Detection',    'bug')}
    <button class="ask-ai-about" onclick="askAboutScanResults()">
      <i class="fas fa-robot"></i> Ask AI about these results
    </button>`;
  setTimeout(() => {
    el.querySelectorAll('.conf-bar-fg[data-w]').forEach(bar => { bar.style.width = bar.dataset.w; });
  }, 60);
}

function renderBlock(data, cls, title, icon) {
  if (!data) return '';
  const isHealthy = data.is_healthy || data.label === 'Healthy';
  const conf    = typeof data.confidence === 'number' ? data.confidence : parseFloat(data.confidence) || 0;
  const confPct = data.confidence_pct || `${(conf * 100).toFixed(1)}%`;
  const barW    = `${Math.round(conf * 100)}%`;

  let body;
  if (isHealthy) {
    body = `
      <div class="healthy-badge"><i class="fas fa-check-circle"></i> No ${cls === 'd' ? 'disease' : 'pest'} — Plant looks healthy!</div>
      <div class="conf-bar-bg"><div class="conf-bar-fg ${cls}" style="width:0" data-w="${barW}"></div></div>
      <div class="conf-pct">Confidence: ${confPct}</div>`;
  } else {
    const sev    = data.severity || 'Unknown';
    const sevCls = sev.toLowerCase() === 'none' ? 'sev-none' :
                   sev.toLowerCase() === 'low'  ? 'sev-low'  :
                   sev.toLowerCase() === 'high' ? 'sev-high' : 'sev-medium';
    body = `
      <div class="det-label ${cls}">${esc(data.label || 'Unknown')}</div>
      <div class="conf-bar-bg"><div class="conf-bar-fg ${cls}" style="width:0" data-w="${barW}"></div></div>
      <div class="conf-pct">Confidence: ${confPct}</div>
      <span class="sev-chip ${sevCls}">${esc(sev)} Severity</span>
      ${data.explanation    ? detRow('info-circle', 'What is it',  data.explanation)    : ''}
      ${data.treatment      ? detRow('pills',       'Treatment',   data.treatment)      : ''}
      ${data.fertilizer     ? detRow('flask',       'Fertilizer',  data.fertilizer)     : ''}
      ${data.prevention     ? detRow('shield-alt',  'Prevention',  data.prevention)     : ''}
      ${data.organic_option ? detRow('leaf',        'Organic',     data.organic_option) : ''}
      ${data.urgency ? `<div style="margin-top:7px; padding:7px 10px; background:#fef9c3; border:1px solid var(--amber-bd); border-radius:7px; font-size:11.5px; color:var(--amber-txt);">
        <i class="fas fa-clock" style="margin-right:5px;"></i>${esc(data.urgency)}</div>` : ''}`;
  }
  return `
    <div class="det-block">
      <div class="det-hdr ${cls}"><i class="fas fa-${icon}"></i> ${title}</div>
      <div class="det-body">${body}</div>
    </div>`;
}

function detRow(icon, label, value) {
  return `<div class="det-row"><i class="fas fa-${icon}"></i><div><strong>${esc(label)}:</strong> <span>${esc(value)}</span></div></div>`;
}

function askAboutScanResults() {
  const ctx = getContext();
  const d = ctx.disease && ctx.disease.toLowerCase() !== 'healthy' ? ctx.disease : '';
  const p = ctx.pest    && ctx.pest.toLowerCase()    !== 'healthy' ? ctx.pest    : '';
  const c = ctx.crop;
  let q = 'Based on the scan results';
  if (c) q += ` for my ${c} crop`;
  if (d) q += `, disease "${d}" was detected`;
  if (p) q += `${d ? ' and' : ','} pest "${p}" was detected`;
  q += '. What immediate actions should I take to prevent yield loss?';
  quickAsk(q);
}

// ── Expert replies ────────────────────────────────────────────────────────────
async function loadExpertReplies() {
  const icon = document.getElementById('expertRefreshIcon');
  if (icon) icon.className = 'fas fa-sync-alt fa-spin';
  try {
    const res  = await fetch(`${API}/api/expert/queries`, { credentials: 'include' });
    const data = await res.json();
    if (!data?.success || !Array.isArray(data.data)) { renderExpertList([]); return; }
    const answered = data.data.filter(q => (q.status || '').toLowerCase() === 'answered');
    const newIds   = new Set();
    answered.forEach(q => {
      const key = String(q.query_id ?? q.id ?? '');
      if (key && !seenExpertIds.has(key)) newIds.add(key);
      if (key) seenExpertIds.add(key);
    });
    const badge = document.getElementById('expertBadge');
    if (badge) badge.textContent = answered.length;
    renderExpertList(answered, newIds);
  } catch { renderExpertList([]); }
  finally { if (icon) setTimeout(() => { icon.className = 'fas fa-sync-alt'; }, 600); }
}

function renderExpertList(items, newIds = new Set()) {
  const el = document.getElementById('expertList');
  if (!items.length) {
    el.innerHTML = '<div class="no-replies"><i class="fas fa-comment-dots"></i>No expert replies yet.</div>';
    return;
  }
  el.innerHTML = '';
  items.forEach(q => {
    const card = document.createElement('div');
    card.className = 'expert-card';
    const qid = q.query_id ?? q.id;
    if (qid != null && newIds.has(String(qid))) {
      card.classList.add('new-reply');
      setTimeout(() => card.classList.remove('new-reply'), 8000);
    }
    card.innerHTML = `
      <p class="q-text">
        <i class="fas fa-question-circle" style="color:var(--muted); margin-right:4px;"></i>
        ${esc(q.query_text || '')}
      </p>
      <p style="margin-top:5px; font-size:11px; color:var(--muted);">${esc(q.status || '')}</p>
      ${q.expert_response
        ? `<p class="e-answered" style="margin-top:5px;"><i class="fas fa-check-circle" style="margin-right:4px;"></i>${esc(q.expert_response)}</p>`
        : `<p style="color:var(--muted); font-size:11px; font-style:italic;">Awaiting expert response…</p>`}`;
    el.appendChild(card);
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
document.getElementById('sendBtn').addEventListener('click', sendMessage);

// Welcome message
addSysMsg('Hi! I\'m KrishiSetu Smart Assistant. Use the Context tab to set your farm data for personalised advice.');

// Auto-load context from localStorage silently on open
(function () {
  const get = k => localStorage.getItem(k) || '';
  const crop = get(LS.CROP), disease = get(LS.DISEASE), pest = get(LS.PEST);
  const yld  = get(LS.YIELD), price = get(LS.PRICE), cost = get(LS.COST);
  if (crop)    document.getElementById('ctx-crop').value    = crop;
  if (disease) document.getElementById('ctx-disease').value = disease;
  if (pest)    document.getElementById('ctx-pest').value    = pest;
  if (yld)     document.getElementById('ctx-yield').value   = yld;
  if (price)   document.getElementById('ctx-price').value   = price;
  if (cost)    document.getElementById('ctx-cost').value    = cost;
  refreshBadges();

  // If a `?q=` param was passed (e.g. from crop.html "Ask AI" button), auto-ask it
  const params = new URLSearchParams(window.location.search);
  const preQ   = params.get('q');
  if (preQ) {
    setTimeout(() => quickAsk(decodeURIComponent(preQ)), 400);
  }
})();

loadExpertReplies();
setInterval(loadExpertReplies, 10000);
</script>
