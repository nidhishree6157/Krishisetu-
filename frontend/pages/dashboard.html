<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KrishiSetu</title>
  <link rel="icon" href="../images/krishisetu-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ═══════════════════════════════════════════════
       Dashboard variables & resets
    ═══════════════════════════════════════════════ */
    :root {
      --dg:        #2e7d32;
      --dg2:       #1b5e20;
      --dg-lt:     #e8f5e9;
      --dg-bd:     #c8e6c9;
      --ds:        #0f172a;
      --dm:        #64748b;
      --dbg:       #f5f7fa;
      --dcard:     #ffffff;
      --dborder:   #e2e8f0;
      --dshadow:   0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
      --dshadow-lg:0 8px 32px rgba(0,0,0,.10);
      --dradius:   14px;
      --dtrans:    .2s ease;
    }

    .content-area { padding: 24px 28px; max-width: 1200px; }
    @media (max-width: 768px) { .content-area { padding: 16px; } }

    /* ═══════════════════════════════════════════
       Top row: welcome + weather
    ═══════════════════════════════════════════ */
    .dash-top-row {
      display: grid;
      grid-template-columns: 1fr minmax(300px, 400px);
      gap: 24px;
      align-items: stretch;
      margin-bottom: 0;
    }
    @media (max-width: 960px) {
      .dash-top-row { grid-template-columns: 1fr; }
    }
    .dash-welcome-stack { min-width: 0; }
    .dash-welcome {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }
    .dash-welcome-text h1 {
      font-size: clamp(1.2rem, 2.5vw, 1.55rem);
      font-weight: 700;
      color: var(--ds);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .dash-welcome-text p.dash-subtitle {
      font-size: 14px;
      color: var(--dm);
      line-height: 1.5;
      max-width: 36rem;
    }

    .dash-date {
      font-size: 13px; color: var(--dm);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 12px;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }
    .d-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(46, 125, 50, 0.08);
    }
    .d-card-title {
      font-size: 14px; font-weight: 700; color: var(--ds);
      display: flex; align-items: center; gap: 8px;
    }
    .d-card-title i { color: var(--dg); }
    .d-card-link {
      font-size: 12px; font-weight: 600; color: var(--dg);
      background: none; border: none; cursor: pointer; text-decoration: none;
    }
    .d-card-link:hover { text-decoration: underline; }
    .d-card-body { padding: 18px 20px; }

    .dash-stack { display: flex; flex-direction: column; gap: 22px; }

    .dash-top-row.ks-animate-in { animation-delay: 0.04s; }
    .dash-stack .d-card.ks-animate-in:nth-of-type(1) { animation-delay: 0.12s; }
    .dash-stack .d-card.ks-animate-in:nth-of-type(2) { animation-delay: 0.2s; }

    /* ── Scrollable notifications ── */
    .notif-scroll {
      max-height: 280px;
      overflow-y: auto;
      overflow-x: hidden;
      margin: 0 -4px;
      padding: 0 4px 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--dg-bd) transparent;
    }
    .notif-scroll::-webkit-scrollbar { width: 6px; }
    .notif-scroll::-webkit-scrollbar-thumb {
      background: var(--dg-bd);
      border-radius: 6px;
    }

    /* ── Notification Preview ── */
    .notif-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid #f8fafc;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-ico {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }
    .notif-ico.disease { background: linear-gradient(145deg, #fecaca, #fee2e2); color: #991b1b; }
    .notif-ico.expert  { background: linear-gradient(145deg, #bfdbfe, #e0f2fe); color: #1d4ed8; }
    .notif-ico.info    { background: #f1f5f9; color: var(--dm); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-msg  { font-size: 13px; color: var(--ds); font-weight: 500; line-height: 1.4; }
    .notif-time { font-size: 11px; color: var(--dm); margin-top: 2px; }
    .notif-dot  {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dg); margin-top: 6px; flex-shrink: 0;
    }
    .notif-unread-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px;
      border-radius: 10px; background: #b91c1c; color: #fff;
      font-size: 11px; font-weight: 700;
    }

    /* ── Quick Actions: 2×3 grid (presentation) ── */
    .qa-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 400px) {
      .qa-grid { grid-template-columns: 1fr; }
    }
    .qa-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 22px 12px;
      min-height: 112px;
      text-align: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.95) 0%, #e8f5e9 55%, rgba(255, 255, 255, 0.88) 100%);
      box-shadow: 0 8px 24px rgba(46, 125, 50, 0.08);
      cursor: pointer; text-decoration: none;
      color: var(--ds);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, background 0.3s ease;
    }
    .qa-btn:hover {
      background: linear-gradient(160deg, #f1f8f4 0%, #ffffff 100%);
      border-color: var(--dg);
      transform: scale(1.05);
      box-shadow: 0 14px 32px rgba(46, 125, 50, 0.2);
    }
    .qa-btn:active { transform: scale(1.02); }
    .qa-btn i {
      font-size: 22px;
      color: var(--dg);
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--dg-lt);
      display: flex; align-items: center; justify-content: center;
    }
    .qa-btn span { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.35; }

    /* ── Misc ── */
    .empty-hint {
      padding: 22px 0; text-align: center;
      color: var(--dm); font-size: 12.5px;
    }
    .empty-hint i { display: block; font-size: 24px; margin-bottom: 8px; opacity: .4; }
  </style>
</head>

<body>

<script>
/* ═══════════════════════════════════════════════════════════
   KrishiSetu Dashboard
═══════════════════════════════════════════════════════════ */

const API = 'http://127.0.0.1:5000';

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

function todayStr() {
  return new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
  });
}

// ── Header ──────────────────────────────────────────────────────────────────
function initHeader() {
  document.getElementById('greeting').textContent  = greeting();
  document.getElementById('userName').textContent  = localStorage.getItem('userName') || 'Farmer';
  document.getElementById('todayDate').textContent = todayStr();
}

async function fetchWeatherForInsight(location) {
  const loc = String(location || '').trim();
  if (!loc) return null;
  try {
    const r = await fetch(
      `${API}/weather?location=${encodeURIComponent(loc)}`,
      { credentials: 'include' },
    );
    if (!r.ok) return null;
    const d = await r.json();
    return d.data || null;
  } catch {
    return null;
  }
}

function pickWeatherEmoji(condition) {
  const c = String(condition || '').toLowerCase();
  if (/rain|drizzle|shower|precip/.test(c)) return '🌧️';
  if (/snow|hail/.test(c)) return '❄️';
  if (/thunder|storm|lightning/.test(c)) return '⛈️';
  if (/mist|fog|haze/.test(c)) return '🌫️';
  if (/cloud/.test(c)) return '☁️';
  if (/sun|clear|fair/.test(c)) return '☀️';
  return '🌤️';
}

/**
 * Fills the weather card. On failure or missing profile location, shows
 * "Weather data unavailable" (or prompts to add location).
 */
function updateWeatherWidget(weather, locationLabel, opts) {
  opts = opts || {};
  const card = document.getElementById('weatherCard');
  const tempEl = document.getElementById('weatherTemp');
  const condEl = document.getElementById('weatherCondition');
  const locText = document.getElementById('weatherLocationText');
  const humEl = document.getElementById('weatherHumidity');
  const emojiEl = document.getElementById('weatherEmojiChar');

  const isError = !!(opts.error || opts.noLocation);
  card.classList.toggle('weather-card--error', isError);

  if (opts.noLocation) {
    tempEl.textContent = '—';
    condEl.textContent = 'Weather data unavailable';
    locText.textContent = 'Add location in My Profile';
    humEl.textContent = '';
    if (emojiEl) emojiEl.textContent = '📍';
    return;
  }
  if (opts.error || !weather) {
    tempEl.textContent = '';
    condEl.textContent = 'Weather data unavailable';
    locText.textContent = locationLabel || '—';
    humEl.textContent = '';
    if (emojiEl) emojiEl.textContent = '☁️';
    return;
  }

  card.classList.remove('weather-card--error');
  const t = weather.temperature;
  tempEl.textContent =
    t != null && !Number.isNaN(Number(t)) ? Math.round(Number(t)) + '°C' : '—';
  condEl.textContent = String(weather.condition || '—').trim() || '—';
  locText.textContent = locationLabel || '—';
  if (weather.humidity != null && !Number.isNaN(Number(weather.humidity))) {
    humEl.textContent =
      'Humidity: ' + Math.round(Number(weather.humidity)) + '%';
  } else {
    humEl.textContent = '';
  }
  if (emojiEl) emojiEl.textContent = pickWeatherEmoji(weather.condition);
}

async function loadDashboardContext() {
  let p = null;
  try {
    const r = await fetch(`${API}/profile`, { credentials: 'include' });
    if (r.ok) p = await r.json();
  } catch {}

  if (p && p.success) {
    const name =
      String(p.username || '').trim() ||
      localStorage.getItem('userName') ||
      'Farmer';
    document.getElementById('userName').textContent = name;
    if (p.username) localStorage.setItem('userName', p.username);
  }

  const loc = (p && p.success && String(p.location || '').trim()) || '';
  let weather = null;
  if (loc) weather = await fetchWeatherForInsight(loc);

  if (!loc) {
    updateWeatherWidget(null, '', { noLocation: true });
  } else if (!weather) {
    updateWeatherWidget(null, loc, { error: true });
  } else {
    updateWeatherWidget(weather, loc, {});
  }
}

// ── Notification preview ─────────────────────────────────────────────────────
async function loadNotifPreview() {
  const list  = document.getElementById('notifList');
  const badge = document.getElementById('notifBadge');
  try {
    const r = await fetch(`${API}/notifications/`, { credentials: 'include' });
    if (!r.ok) { renderEmptyNotifs(list); return; }
    const d      = await r.json();
    const all    = d.notifications || [];
    const unread = all.filter(n => !n.read);

    // Update badge
    if (unread.length > 0) {
      badge.style.display  = 'inline-flex';
      badge.textContent    = unread.length > 9 ? '9+' : unread.length;
    } else {
      badge.style.display  = 'none';
    }

    // Show up to 4 unread, fallback to 4 read
    const items = (unread.length > 0 ? unread : all).slice(0, 4);
    if (items.length === 0) { renderEmptyNotifs(list); return; }

    const iconMap = { disease: 'fas fa-virus', expert: 'fas fa-user-tie' };
    const clsMap  = { disease: 'disease',      expert: 'expert'          };

    list.innerHTML = items.map(n => `
      <div class="notif-item">
        <div class="notif-ico ${clsMap[n.type] || 'info'}">
          <i class="${iconMap[n.type] || 'fas fa-info-circle'}"></i>
        </div>
        <div class="notif-body">
          <div class="notif-msg">${esc(n.message)}</div>
          <div class="notif-time">
            <i class="fas fa-clock" style="font-size:10px;"></i>
            ${esc(n.time_label || n.time || '')}
          </div>
        </div>
        ${!n.read ? '<div class="notif-dot"></div>' : ''}
      </div>
    `).join('');

  } catch { renderEmptyNotifs(list); }
}

function renderEmptyNotifs(container) {
  container.innerHTML =
    '<div class="empty-hint"><i class="fas fa-shield-check"></i>All clear — no new notifications</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setActiveNav('dashboard');
  attachNavigation();
  attachHamburger();
  attachLogout();
  app.attachNotification();
  app.attachProfileIcon();

  initHeader();

  loadDashboardContext();
  loadNotifPreview();

  setInterval(() => {
    loadDashboardContext();
    loadNotifPreview();
  }, 30000);
});
</script>
<script src="../js/app.js"></script>
<script>
  window.addEventListener("load", () => {
    try {
      const shown = localStorage.getItem("ks_splash_shown") === "1";
      const el = document.getElementById("splash");
      if (!el) return;
      if (shown) {
        el.style.display = "none";
        return;
      }
      localStorage.setItem("ks_splash_shown", "1");
      setTimeout(() => {
        el.style.display = "none";
      }, 1200);
    } catch {
      const el = document.getElementById("splash");
      if (el) setTimeout(() => (el.style.display = "none"), 1200);
    }
  });
</script>

<script src="../js/logo.js"></script>
<script>initializeLogos();</script>
